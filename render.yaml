services:
  - type: web
    name: stock-query-server-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn server:app -w 1 -b 0.0.0.0:$PORT
    envVars:
      - key: JWT_SECRET_KEY
        value: change-this-to-a-random-secret-in-production
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: PORT
        value: 10000
